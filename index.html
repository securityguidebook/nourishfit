<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png">

    <!-- Viewport: cover lets us use safe-area-inset env vars for notch/home bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NourishFit" />

    <!-- Android / general PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="NourishFit" />

    <!-- SEO / Share -->
    <meta name="description" content="AI-powered nutrition and fitness companion" />

    <title>NourishFit</title>

    <style>
      html, body {
        background: #f2f2f7; /* light default — JS overrides immediately if dark saved */
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        height: 100%;
        width: 100%;
      }
      #root { height: 100%; }
      * { -webkit-touch-callout: none; }
    </style>
    <script>
      /* Sync body background before first paint to avoid overscroll flash */
      (function () {
        var saved = localStorage.getItem('nf_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = saved ? saved === 'dark' : prefersDark;
        document.documentElement.style.background = dark ? '#0a0a0f' : '#f2f2f7';
        document.body.style.background = dark ? '#0a0a0f' : '#f2f2f7';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
