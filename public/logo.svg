<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>

  <defs>
    <radialGradient id="grad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0d1a15"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#00e5a015" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00e5a030" stroke-width="1.5"/>

  <!-- Leaf shape -->
  <path d="M256 120 C310 140 360 180 360 240 C360 310 310 360 256 380 C202 360 152 310 152 240 C152 180 202 140 256 120Z"
        fill="none" stroke="#00e5a0" stroke-width="3" stroke-linejoin="round" opacity="0.25"/>

  <!-- Inner leaf / plant -->
  <path d="M256 340 C256 340 200 295 200 248 C200 210 225 175 256 160 C287 175 312 210 312 248 C312 295 256 340 256 340Z"
        fill="#00e5a018"/>
  <path d="M256 340 C256 340 200 295 200 248 C200 210 225 175 256 160 C287 175 312 210 312 248 C312 295 256 340 256 340Z"
        fill="none" stroke="#00e5a0" stroke-width="2.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Center stem -->
  <line x1="256" y1="340" x2="256" y2="180" stroke="#00e5a0" stroke-width="2" opacity="0.5"/>

  <!-- Leaf veins left -->
  <path d="M256 240 C240 228 218 222 210 215" stroke="#00e5a0" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M256 270 C238 260 218 258 208 255" stroke="#00e5a0" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Leaf veins right -->
  <path d="M256 240 C272 228 294 222 302 215" stroke="#00e5a0" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M256 270 C274 260 294 258 304 255" stroke="#00e5a0" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Lightning bolt overlay (fitness) -->
  <path d="M268 175 L242 252 L260 252 L244 337 L290 238 L268 238 L285 175Z"
        fill="#00e5a0" opacity="0.9"/>
  <path d="M268 175 L242 252 L260 252 L244 337 L290 238 L268 238 L285 175Z"
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Glow dot top -->
  <circle cx="256" cy="148" r="6" fill="#00e5a0" opacity="0.6"/>
  <circle cx="256" cy="148" r="12" fill="none" stroke="#00e5a0" stroke-width="1" opacity="0.2"/>
</svg>
